Recipe:
  type: object
  required:
    - name
    - description
    - difficulty
    - time
    - servings
    - ingredients
    - steps
  properties:
    name:
      type: string
      description: 菜谱名称
      example: 红烧肉
    description:
      type: string
      description: 菜谱描述
      example: 经典家常菜，肥而不腻，入口即化
    difficulty:
      type: integer
      description: 制作难度（1-5）
      minimum: 1
      maximum: 5
      example: 4
    time:
      type: string
      description: 预计制作时间
      example: 90分钟
    servings:
      type: integer
      description: 份数
      example: 4
    ingredients:
      type: array
      description: 所需食材列表
      items:
        type: object
        properties:
          name:
            type: string
            example: 五花肉
          amount:
            type: string
            example: 500g
    steps:
      type: array
      description: 制作步骤
      items:
        type: object
        properties:
          step:
            type: integer
            description: 步骤序号
            example: 1
          title:
            type: string
            description: 步骤标题
            example: 准备食材
          description:
            type: string
            description: 步骤描述
            example: 五花肉切成3-4cm见方的块，生姜切片，大葱切段
          time:
            type: string
            description: 预计时间
            example: 10分钟
          tips:
            type: string
            description: 小贴士
            example: 选择肥瘦相间的五花肉，口感最佳
    nutrition:
      type: object
      description: 营养信息
      properties:
        calories:
          type: integer
          example: 520
        protein:
          type: integer
          example: 25
        carbs:
          type: integer
          example: 45
        fat:
          type: integer
          example: 35
    tips:
      type: array
      description: 烹饪小贴士
      items:
        type: string
      example:
        - 选用五花肉要肥瘦相间，这样烧出来才好吃
        - 炒糖色是关键，决定了红烧肉的颜色和口感
