Ingredient:
  type: object
  required:
    - name
    - amount
    - category
  properties:
    name:
      type: string
      description: 食材名称
      example: 五花肉
    amount:
      type: string
      description: 需要的分量
      example: 500g
    category:
      type: string
      description: 食材分类
      enum: [肉类, 蔬菜, 蛋类, 调料, 其他]
      example: 肉类
    status:
      type: string
      description: 状态
      enum: [已有, 需购买]
      example: 需购买
    purchaseTip:
      type: string
      description: 购买建议
      example: 建议选择新鲜、有光泽的肉品
    purchased:
      type: boolean
      description: 是否已购买
      default: false
      example: false

IngredientList:
  type: array
  items:
    $ref: '#/Ingredient'

CategorizedIngredients:
  type: object
  additionalProperties:
    $ref: '#/IngredientList'
  example:
    肉类:
      - name: 五花肉
        amount: 500g
        category: 肉类
        status: 需购买

ShoppingList:
  type: object
  properties:
    summary:
      type: object
      properties:
        totalItems:
          type: integer
          example: 12
        needToBuy:
          type: integer
          example: 8
        alreadyHave:
          type: integer
          example: 4
    ingredients:
      $ref: '#/CategorizedIngredients'
