SuccessResponse:
  type: object
  required:
    - success
    - data
  properties:
    success:
      type: boolean
      example: true
    data:
      type: object
      description: 响应数据
    message:
      type: string
      description: 成功消息
      example: 操作成功

ErrorResponse:
  type: object
  required:
    - success
    - error
  properties:
    success:
      type: boolean
      example: false
    error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误码
          example: VALIDATION_ERROR
        message:
          type: string
          description: 错误消息
          example: 请指定用餐类型（早餐/午餐/晚餐）
        details:
          type: object
          description: 错误详情
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
          example: 2024-03-14T12:00:00.000Z

PaginationMeta:
  type: object
  properties:
    page:
      type: integer
      example: 1
    pageSize:
      type: integer
      example: 20
    total:
      type: integer
      example: 100
    totalPages:
      type: integer
      example: 5

PaginatedResponse:
  allOf:
    - $ref: '#/SuccessResponse'
    - type: object
      properties:
        pagination:
          $ref: '#/PaginationMeta'
