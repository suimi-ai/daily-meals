Dish:
  type: object
  required:
    - name
    - description
    - difficulty
    - time
  properties:
    name:
      type: string
      description: 菜品名称
      example: 红烧肉
    description:
      type: string
      description: 菜品描述
      example: 肥而不腻，入口即化
    difficulty:
      type: integer
      description: 制作难度（1-5）
      minimum: 1
      maximum: 5
      example: 4
    time:
      type: string
      description: 预计制作时间
      example: 90分钟

DishList:
  type: array
  items:
    $ref: '#/Dish'

Nutrition:
  type: object
  properties:
    calories:
      type: integer
      description: 卡路里（kcal）
      example: 520
    protein:
      type: integer
      description: 蛋白质（g）
      example: 25
    carbs:
      type: integer
      description: 碳水化合物（g）
      example: 45
    fat:
      type: integer
      description: 脂肪（g）
      example: 35

Menu:
  type: object
  properties:
    dishes:
      $ref: '#/DishList'
    nutrition:
      $ref: '#/Nutrition'
