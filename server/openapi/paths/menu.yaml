generate:
  post:
    tags:
      - menu
    summary: 生成菜单
    description: 根据用户输入生成个性化的早餐/午餐/晚餐菜单
    operationId: generateMenu
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - mealType
            properties:
              mealType:
                type: string
                description: 用餐类型
                enum: [早餐, 午餐, 晚餐]
                example: 午餐
              servings:
                type: integer
                description: 用餐人数
                minimum: 1
                maximum: 10
                default: 2
                example: 2
              preferences:
                type: array
                description: 口味偏好
                items:
                  type: string
                example: [清淡, 不辣]
              restrictions:
                type: array
                description: 饮食限制
                items:
                  type: string
                example: [不吃海鲜]
          examples:
            lunch:
              summary: 午餐菜单
              value:
                mealType: 午餐
                servings: 2
                preferences: []
                restrictions: []
    responses:
      '200':
        description: 成功生成菜单
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/response.yaml#/SuccessResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../schemas/dish.yaml#/Menu'
            example:
              success: true
              data:
                dishes:
                  - name: 红烧肉
                    description: 肥而不腻，入口即化
                    difficulty: 4
                    time: 90分钟
                  - name: 清炒时蔬
                    description: 新鲜蔬菜，清淡爽口
                    difficulty: 2
                    time: 10分钟
                nutrition:
                  calories: 650
                  protein: 25
                  carbs: 45
                  fat: 35
      '400':
        description: 参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/response.yaml#/ErrorResponse'
            example:
              success: false
              error:
                code: VALIDATION_ERROR
                message: 请指定用餐类型（早餐/午餐/晚餐）

recommend:
  get:
    tags:
      - menu
    summary: 获取推荐菜品
    description: 获取热门推荐和季节性推荐菜品
    operationId: getRecommendations
    responses:
      '200':
        description: 成功获取推荐
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/response.yaml#/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        popular:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              rating:
                                type: number
                              orders:
                                type: integer
                        seasonal:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              reason:
                                type: string
