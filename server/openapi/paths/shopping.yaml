generate:
  post:
    tags:
      - shopping
    summary: 生成购物清单
    description: 根据选择的菜品生成详细的购物清单
    operationId: generateShoppingList
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - dishes
            properties:
              dishes:
                type: array
                description: 选定的菜品列表
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: 红烧肉
              servings:
                type: integer
                description: 用餐人数
                default: 2
                example: 2
              existingIngredients:
                type: array
                description: 现有食材列表
                items:
                  type: string
                example: [盐, 酱油]
          example:
            dishes:
              - name: 红烧肉
              - name: 清炒时蔬
            servings: 2
            existingIngredients: []
    responses:
      '200':
        description: 成功生成购物清单
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/response.yaml#/SuccessResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../schemas/ingredient.yaml#/ShoppingList'
      '400':
        description: 参数错误
        content:
          application/json:
            schema:
              $ref: '../schemas/response.yaml#/ErrorResponse'
            example:
              success: false
              error:
                code: VALIDATION_ERROR
                message: 请选择要制作的菜品

inventory:
  post:
    tags:
      - shopping
    summary: 更新库存
    description: 更新现有食材库存
    operationId: updateInventory
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - ingredients
            properties:
              ingredients:
                type: array
                description: 食材列表
                items:
                  type: string
                example: [盐, 酱油, 醋]
    responses:
      '200':
        description: 成功更新库存
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/response.yaml#/SuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        updated:
                          type: boolean
                          example: true
                        count:
                          type: integer
                          example: 3
                        timestamp:
                          type: string
                          format: date-time
