openapi: 3.0.0
info:
  title: 一日三餐 API
  version: 1.0.0
  description: |
    AI驱动的智能餐饮规划助手 API
    
    ## 核心功能
    - 🍽️ 智能菜单生成
    - 🛒 购物清单管理
    - 👨‍🍳 烹饪指导查询

  contact:
    name: API Support
    email: support@daily-meals.com
    url: https://github.com/suimi-ai/daily-meals

  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: 开发环境
  - url: https://api.daily-meals.com/api
    description: 生产环境

tags:
  - name: menu
    description: 菜单生成相关接口
  - name: shopping
    description: 购物清单相关接口
  - name: recipe
    description: 菜谱查询相关接口

paths:
  /menu/generate:
    $ref: './paths/menu.yaml#/generate'
  
  /menu/recommend:
    $ref: './paths/menu.yaml#/recommend'
  
  /shopping/generate:
    $ref: './paths/shopping.yaml#/generate'
  
  /shopping/inventory:
    $ref: './paths/shopping.yaml#/inventory'
  
  /recipe/{dishName}:
    $ref: './paths/recipe.yaml#/getByName'
  
  /recipe/search:
    $ref: './paths/recipe.yaml#/search'

components:
  schemas:
    Dish:
      $ref: './schemas/dish.yaml#/Dish'
    
    Ingredient:
      $ref: './schemas/ingredient.yaml#/Ingredient'
    
    Recipe:
      $ref: './schemas/recipe.yaml#/Recipe'
    
    SuccessResponse:
      $ref: './schemas/response.yaml#/SuccessResponse'
    
    ErrorResponse:
      $ref: './schemas/response.yaml#/ErrorResponse'
